# ============================================================
# Recovery Methods — Inkjet Printer
# ============================================================
# Pipeline #3 (LLM stage) reads this file via RAG. When the
# Context Model flags a feature linked to one of these error
# codes, the matching entry is retrieved and added to the
# LLM prompt alongside the impact values.
#
# Edit freely — this is content owned by the engineering team,
# not the dev team. New error code? Add a new entry.
# ============================================================

version: 1
machine: inkjet_printer
last_reviewed: 2026-05-07
reviewed_by: "Dion Ko"

entries:

  # ── Air pressure low ──────────────────────────────────────
  air_pressure_low:
    severity: high
    symptom: >
      Air supply pressure dropped below the minimum operating
      threshold. Cylinders may stall or move slowly; printer
      may pause until pressure recovers.
    related_signals:
      - air_pressure_low_ratio
      - acoustic_emission
    likely_causes:
      - "Compressor not running or running below capacity"
      - "Air filter clogged"
      - "Leak in supply line or fitting"
      - "Pressure regulator misconfigured"
    recommended_actions:
      - "Check the compressor pressure gauge — must read above the threshold on the controller"
      - "Inspect the inline air filter; replace if discoloured or blocked"
      - "Trace the supply line by ear or hand for hissing or vibration near connectors"
      - "Verify the pressure regulator setpoint matches the machine spec"
    references:
      - "Inkjet Printer Operations Manual §4.2 — Air Supply"

  # ── Cycle stop ────────────────────────────────────────────
  cycle_stop:
    severity: medium
    symptom: >
      The machine cycle was halted mid-operation. Could be
      operator-initiated or an automatic safety routine.
    related_signals:
      - cycle_stop_present
      - vibration
      - setpressure_cycle_count
    likely_causes:
      - "Operator pressed cycle-stop intentionally (planned interruption)"
      - "Material jam triggered the safety routine"
      - "Upstream feed system stalled"
      - "Sensor disagreement between cycle-start and cycle-end signals"
    recommended_actions:
      - "Confirm whether the stop was operator-intentional or unexpected"
      - "Inspect the material path for jams or misfeeds"
      - "Check the upstream conveyor / feeder running status"
      - "Resume the cycle from the operator panel once the cause is cleared"
    references:
      - "Inkjet Printer Operations Manual §3.5 — Cycle Control"

  # ── E-stop activated ──────────────────────────────────────
  estop_activated:
    severity: critical
    symptom: >
      Emergency stop button was pressed. All motion halted
      immediately and the machine entered a safe state.
    related_signals:
      - cycle_stop_present
      - vibration
    likely_causes:
      - "Operator hit E-stop in response to a perceived safety concern"
      - "Safety interlock tripped (door open, light curtain broken)"
      - "Hard-fault from an upstream system propagated as an E-stop"
    recommended_actions:
      - "STOP — do not reset the E-stop until the cause is identified"
      - "Visually inspect the machine and surrounding area for hazards"
      - "Check all safety interlocks (doors, guards, light curtains)"
      - "Once safe, reset the E-stop and reinitialise via the standard startup sequence"
      - "Log the event in the maintenance system with timestamp + cause"
    references:
      - "Inkjet Printer Operations Manual §1 — Safety"

  # ── Printer error ─────────────────────────────────────────
  printer_error:
    severity: high
    symptom: >
      Printer reported an internal malfunction. Print quality
      may be compromised or the print process may have stopped.
    related_signals:
      - acoustic_emission
      - vibration
      - setpressure_cycle_count
    likely_causes:
      - "Print head clogged or damaged"
      - "Ink viscosity out of range (typically temperature drift)"
      - "Encoder fault — head position not being tracked"
      - "Firmware error or controller fault"
    recommended_actions:
      - "Read the specific error code from the controller display"
      - "Run the print-head cleaning cycle from the operator panel"
      - "Check ink temperature and viscosity readings against spec"
      - "Inspect the encoder ribbon / sensor for damage or contamination"
      - "If the error persists, power-cycle the controller"
      - "Escalate to maintenance if the error reappears within 1 hour"
    references:
      - "Inkjet Printer Operations Manual §6 — Print System Diagnostics"
