# ============================================================
# PCIL Pipeline Config — Oil Filler  (STUB)
# ============================================================
# This is a placeholder showing the structure for the next
# machine. Replace the TODOs with real values when the oil
# filler data lands. Notice this machine has no vibration
# sensor — only temperature + flow.
# ============================================================

machine:
  id: oil_filler
  name: "Oil Filler"
  station: "TODO — fill in once the filler is assigned a station"

pipeline:
  window_size: "1s"
  base_data_dir: "../../.."
  output_dir: "output"

# ── Schema: 5 features (no vibration). One target. ─────────
schema:
  timestamp_column: timestamp
  scenario_column:  scenario

  targets:
    - { name: oee, normalize: none }

  factors:
    - name: low_flow_ratio
      source: mqtt
      type: binary
      column: "Low flow"            # TODO: real column name
      aggregation: ratio
      normalize: none
    - name: overfill_present
      source: mqtt
      type: binary
      column: "Overfill"            # TODO: real column name
      aggregation: present
      normalize: none
    - name: oil_temp_mean
      source: machine_params
      type: numeric
      column: "OilTemp"             # TODO: real column name
      aggregation: mean
      normalize: minmax
    - name: flow_rate_mean
      source: machine_params
      type: numeric
      column: "FlowRate"            # TODO: real column name
      aggregation: mean
      normalize: minmax
    - name: setpressure_mean
      source: machine_params
      type: numeric
      column: "SetPressure"         # TODO: confirm sensor list
      aggregation: mean
      normalize: minmax

# ── MQTT (error flags) ──────────────────────────────────────
mqtt:
  data_type: irregular
  data_dir: "TODO/oil_filler/mqtt"  # TODO

  time_column: "_time"

  flag_columns: []                  # TODO

  scenarios:                        # TODO: enumerate real scenarios
    no_error:
      file: "TODO.csv"
      description: "Normal operation"

  features:
    - active_ms
    - ratio
    - present
    - transitions

# ── Acoustic block kept for compatibility but EMPTY ────────
# Note: the oil filler has no vibration sensor in this stub.
# If a sensor is added later, populate this block.
acoustic:
  data_type: non_cyclical
  data_dir: "TODO"
  sample_rate: 0
  header_rows: 0
  sensor_columns: []
  features:
    accel: []
    ae: []
  conditions: {}

# ── Machine parameters (temperature + flow) ─────────────────
machine_params:
  data_type: cyclical
  cycle_window: "5s"
  file: "TODO/oil_filler_params.csv"
  separator: ";"
  time_column: "_time"

  columns: []                       # TODO: list real columns

  features:
    stats:
      - mean
      - std
      - min
      - max
      - range
    cycle:
      - cycle_count

# ── OEE inputs ─────────────────────────────────────────────
oee:
  planned_production_time: 600
  ideal_cycle_time: 30              # TODO: confirm with engineering

  scenarios:
    no_error:
      run_time: 600
      operating_time: 600
      good_units: 20
